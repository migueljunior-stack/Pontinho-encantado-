<!DOCTYPE html><html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontinho Encantado</title>
    <style>
    body{font-family:'Segoe UI',sans-serif;margin:0;background:#fff0f6}
    header{background:linear-gradient(45deg,#000,#ff4da6);color:#fff;padding:20px;text-align:center;font-size:24px;font-weight:bold}
    .container{padding:20px;display:flex;flex-wrap:wrap;justify-content:center;gap:15px}
    .produto{background:#fff;border-radius:15px;padding:15px;width:220px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
    img{width:100%;border-radius:10px}
    select,button,input{margin-top:8px;padding:10px;width:100%;border-radius:8px;border:none}
    button{background:#ff4da6;color:#fff;font-weight:bold;cursor:pointer}
    #admin{background:#fff;padding:15px;margin:10px;border-radius:10px}
    </style>
    </head>
    <body><header>Pontinho Encantado 🎀</header><div id="admin">
    <h3>🔐 Login Admin</h3>
    <input id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button><div id="painel" style="display:none">
    <h3>➕ Adicionar Produto</h3>
    <input id="nome" placeholder="Nome">
    <input id="preco" placeholder="Preço">
    <input id="imagem" placeholder="URL da imagem">
    <input id="cores" placeholder="Cores (ex: rosa,preto)">
    <button onclick="adicionarProduto()">Salvar</button>
    </div>
    </div><div class="container" id="produtos"></div><script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAEYJ4F0veto2ra5Yh_T07G7WC1iZAvE78",
        authDomain: "pontinho-encantado-1.firebaseapp.com",
          projectId: "pontinho-encantado-1",
            storageBucket: "pontinho-encantado-1.firebasestorage.app",
              messagingSenderId: "272748549714",
                appId: "1:272748549714:web:d5fef26fee5f872356b18b"
                };

                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);

                window.login = function(){
                 if(document.getElementById("senha").value === "1234"){
                    document.getElementById("painel").style.display="block";
                     }
                     }

                     window.adicionarProduto = async function(){
                      let nome = document.getElementById("nome").value;
                       let preco = document.getElementById("preco").value;
                        let imagem = document.getElementById("imagem").value;
                         let cores = document.getElementById("cores").value.split(",");

                          await addDoc(collection(db, "produtos"), {nome, preco, imagem, cores});
                           carregar();
                           }

                           async function carregar(){
                            let div = document.getElementById("produtos");
                             div.innerHTML="";
                              const querySnapshot = await getDocs(collection(db, "produtos"));
                               querySnapshot.forEach((doc) => {
                                 let p = doc.data();
                                   div.innerHTML += `
                                     <div class='produto'>
                                        <img src='${p.imagem}'>
                                           <h3>${p.nome}</h3>
                                              <p>R$ ${p.preco}</p>
                                                 <select>
                                                     ${p.cores.map(c=>`<option>${c}</option>`).join("")}
                                                        </select>
                                                           <button onclick="comprar('${p.nome}')">Comprar</button>
                                                             </div>`;
                                                              });
                                                              }

                                                              window.comprar = function(nome){
                                                               let msg = `Olá, quero comprar: ${nome}`;
                                                                window.open(`https://wa.me/5517997355401?text=${encodeURIComponent(msg)}`);
                                                                }

                                                                carregar();
                                                                </script></body>
                                                                </html>
