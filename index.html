<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontinho Encantado</title><style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ff4da6;color:#fff;padding:15px;text-align:center;font-size:22px}

nav{display:flex;justify-content:space-around;background:#fff;padding:10px}
nav button{background:#ff4da6;color:#fff;border:none;padding:10px;border-radius:8px}

.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:10px}
.produto{background:#fff;padding:10px;border-radius:10px;text-align:center}
img{width:100%;border-radius:10px}

button{margin-top:5px;padding:8px;border:none;border-radius:5px;background:#ff4da6;color:#fff}

#carrinho{
 position:fixed;
 right:-300px;
 top:0;
 width:280px;
 height:100%;
 background:#fff;
 padding:10px;
 transition:0.3s;
 overflow:auto;
}

.item{display:flex;justify-content:space-between;margin-bottom:5px}
</style></head><body><header>Pontinho Encantado 🛍️</header><button onclick="toggleCarrinho()" style="position:fixed;top:10px;right:10px">🛒</button>

<nav>
<button onclick="mostrar('loja')">Loja</button>
<button onclick="mostrar('login')">Conta</button>
<button onclick="mostrar('personalizar')">Personalizar</button>
<button onclick="mostrar('finalizar')">Finalizar</button>
</nav><div id="loja" class="container"></div><div id="login" style="display:none;padding:20px">
<h2>Conta</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
<button onclick="cadastrar()">Criar conta</button>
<button onclick="google()">Google</button>
</div><div id="personalizar" style="display:none;padding:20px">
<h2>🎀 Personalizar</h2>
<input id="pNome" placeholder="Produto">
<input id="pCor" placeholder="Cor">
<input id="pDetalhe" placeholder="Detalhes">
<button onclick="personalizar()">Enviar</button>
</div><div id="finalizar" style="display:none;padding:20px">
<h2>Finalizar</h2>
<input id="nome" placeholder="Nome">
<input id="endereco" placeholder="Endereço">
<button onclick="finalizar()">Confirmar</button>
</div><div id="carrinho">
<h3>Carrinho</h3>
<div id="lista"></div>
<p>Total: R$ <span id="total">0</span></p>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
 apiKey:"AIzaSyAEY...",
 authDomain:"pontinho-encantado-1.firebaseapp.com",
 projectId:"pontinho-encantado-1"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let carrinho=[];

window.toggleCarrinho=()=>{
 let c=document.getElementById("carrinho");
 c.style.right = (c.style.right=="0px") ? "-300px" : "0px";
}

window.mostrar=(sec)=>{
 ["loja","login","personalizar","finalizar"].forEach(id=>document.getElementById(id).style.display="none");
 document.getElementById(sec).style.display="block";
}

async function carregar(){
 let div=document.getElementById("loja");
 const dados=await getDocs(collection(db,"produtos"));
 dados.forEach(doc=>{
  let p=doc.data();
  div.innerHTML+=`
  <div class='produto'>
   <img src='${p.imagem}'>
   <p>${p.nome}</p>
   <p>R$${p.preco}</p>
   <button onclick="add('${p.nome}',${p.preco})">+</button>
  </div>`;
 });
}

window.add=(nome,preco)=>{
 carrinho.push({nome,preco});
 atualizar();
}

window.remover=(i)=>{
 carrinho.splice(i,1);
 atualizar();
}

function atualizar(){
 let lista=document.getElementById("lista");
 lista.innerHTML="";
 let total=0;

 carrinho.forEach((item,i)=>{
  lista.innerHTML+=`
  <div class='item'>
   ${item.nome} - ${item.preco}
   <button onclick="remover(${i})">X</button>
  </div>`;
  total+=Number(item.preco);
 });

 document.getElementById("total").innerText=total;
}

window.finalizar=async()=>{
 let nome=document.getElementById("nome").value;
 let endereco=document.getElementById("endereco").value;

 await addDoc(collection(db,"pedidos"),{nome,endereco,carrinho});

 alert("Pedido realizado!");
}

window.personalizar=async()=>{
 let nome=document.getElementById("pNome").value;
 let cor=document.getElementById("pCor").value;
 let detalhe=document.getElementById("pDetalhe").value;

 await addDoc(collection(db,"personalizados"),{nome,cor,detalhe});

 alert("Pedido personalizado enviado!");
}

window.google=()=>{
 const provider=new GoogleAuthProvider();
 signInWithPopup(auth,provider);
}

window.entrar=()=>{
 signInWithEmailAndPassword(auth,email.value,senha.value);
}

window.cadastrar=()=>{
 createUserWithEmailAndPassword(auth,email.value,senha.value);
}

carregar();
</script></body>
</html>
